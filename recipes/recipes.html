<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Book - Apple Crisp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Delicious Apple Crisp Recipe">
    <meta property="og:description" content="Learn how to make the best homemade apple crisp with our easy-to-follow recipe.">
    <meta property="og:url" content="https://andejuli.github.io/wdd131/recipes">
    <meta property="og:image" content="social-preview.png">
    <link rel="icon" href="favicon.ico" type="image/ico">
    <script defer src="recipes.js"></script>
    <link rel="stylesheet" href="recipes.css">
</head>
<body>
    <header>
        <div class="logo-area">
            <img src="recipe-book.png" alt="Recipe Book Logo" class="logo">
            <h1>Recipe Book</h1>
        </div>
        <form class="search-bar">
            <input type="text" placeholder="Search recipes...">
            <button type="submit">
                <img class="search-icon" src="search.svg" alt="Search icon">
            </button>
        </form>
    </header>

    <main>
        <article class="recipe-card">
            <div class="recipe-image">
                <img src="apple-crisp.jpg" alt="Apple Crisp">
            </div>
            <div class="recipe-content">
                <div class="tags">
                    <span>Dessert</span>
                </div>
                <h2>Apple Crisp</h2>
                
                <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star-empty">☆</span>
                </span>

                <p class="description">
                    This apple crisp is a simple yet delicious dessert featuring baked cinnamon-spiced apples topped with a crunchy oat crumble.
                </p>
            </div>
        </article>
    </main>

    <footer>
        <div class="social">
            <a href="#"><img src="instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img src="youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img src="pinterest_icon.svg" alt="pinterest icon"></a>
        </div>
        <p>
            <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>
        </p>
    </footer>
</body>
</html>
